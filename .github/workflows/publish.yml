name: Publish to pub.dev
run-name: "📦 ann_flutter_flavor ${{ github.ref_name }}"

# Trigger: push a tag like  dart-v0.1.0
on:
  push:
    tags:
      - 'dart-v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

jobs:
  # ── Publish via dart-lang reusable workflow (handles setup, dry-run, publish)
  publish:
    permissions:
      id-token: write # Required for OIDC authentication
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1

  # ── Create GitHub Release after publish succeeds ───────────────────────────
  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      # ── Extract version from tag (dart-v0.1.0 → 0.1.0) ───────────────────
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#dart-v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ann_flutter_flavor v${{ steps.version.outputs.VERSION }}"
          body: |
            ## ann_flutter_flavor v${{ steps.version.outputs.VERSION }}

            ### Install
            ```yaml
            dependencies:
              ann_flutter_flavor: ^${{ steps.version.outputs.VERSION }}
            ```

            ### Sync flavors
            ```sh
            dart run ann_flutter_flavor sync
            ```

            ### Links
            - [pub.dev](https://pub.dev/packages/ann_flutter_flavor)
            - [Changelog](https://github.com/anntech-dev/ann-flavor-flutter/blob/main/CHANGELOG.md)
          draft: false
          prerelease: false
