name: ann_flutter_flavor
description: >-
  CLI tool and runtime API for ANN Flutter flavor management.
  Reads annspec.yaml and generates typed Dart flavor code,
  wires the Gradle plugin for Android, and wires the CocoaPods
  plugin for iOS.
version: 0.1.0
homepage: https://github.com/anntech-dev/ann-flutter-flavor
repository: https://github.com/anntech-dev/ann-flutter-flavor
issue_tracker: https://github.com/anntech-dev/ann-flutter-flavor/issues

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  yaml: ^3.1.3
  args: ^2.7.0
  path: ^1.9.1
  collection: ^1.19.1

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.1

executables:
  ann_flutter_flavor: ann_flutter_flavor
