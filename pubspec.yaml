name: ann_flutter_flavor
description: >-
  Multi-flavor Flutter toolkit. Reads annspec.yaml, generates typed flavor
  classes, and wires Android, iOS, Firebase, AdMob and RevenueCat.
version: 0.4.2
homepage: https://anntech.dev/docs/ann-flutter-flavor-suite/flutter-overview
repository: https://github.com/anntech-dev/ann-flavor-flutter
issue_tracker: https://github.com/anntech-dev/ann-flavor-flutter/issues

topics:
  - flutter
  - flavor
  - build-configuration
  - firebase
  - codegen

platforms:
  android:
  ios:
  macos:
  web:
  linux:
  windows:

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  yaml: ^3.1.3
  args: ^2.7.0
  path: ^1.9.1
  collection: ^1.19.1
  meta: ^1.16.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.1

executables:
  ann_flutter_flavor: ann_flutter_flavor
